<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>코코넛 갤러리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jua&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&"
    />
    <link rel="stylesheet" href="./style.css" />

    <style>
      /* ✅ 로그인 전 콘텐츠를 숨기기 위한 설정 */
      #content-wrapper {
        display: none;
      }
      #login-box {
        display: block; /* 처음에 로그인 창은 보여야 함 */
      }
    </style>
  </head>

  <body>
    <header>
      <h1>
        <span class="material-symbols-outlined">agriculture</span>
        새는 알을 깨고 나온다
        <span class="material-symbols-outlined">sprinkler</span>
      </h1>
    </header>

    <nav>
      <a href="index.html">홈으로</a> |
      <a href="subject.html">전공 탐구하기</a> |
      <a href="gallery.html">갤러리</a>
    </nav>

    <main>
      <div
        id="login-box"
        style="
          text-align: center;
          margin: 50px auto;
          max-width: 400px;
          padding: 20px;
          border: 1px solid #ddd;
          border-radius: 15px;
          background: #fff;
        "
      >
        <h2>🔒 시스템 인증이 필요합니다</h2>
        <p style="color: #666; margin-bottom: 20px">
          내용을 보려면 성함과 암호(1234)를 입력하세요.
        </p>
        <div style="margin-bottom: 10px">
          <input
            type="text"
            id="userId"
            placeholder="사용자 이름"
            style="
              width: 80%;
              padding: 10px;
              border-radius: 5px;
              border: 1px solid #ccc;
            "
          />
        </div>
        <div style="margin-bottom: 20px">
          <input
            type="password"
            id="userPw"
            placeholder="암호 입력"
            style="
              width: 80%;
              padding: 10px;
              border-radius: 5px;
              border: 1px solid #ccc;
            "
          />
        </div>
        <button
          onclick="checkLogin()"
          style="
            width: 85%;
            padding: 12px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
          "
        >
          입장하기
        </button>
      </div>

      <div id="content-wrapper">
        <div
          id="secret-area"
          style="
            text-align: center;
            margin: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
          "
        >
          <h3 style="color: #2e7d32; margin: 0">
            👋 <span id="user-display"></span>님, 환영합니다!
          </h3>
          <button
            onclick="logout()"
            style="
              margin-top: 10px;
              cursor: pointer;
              background: none;
              border: 1px solid #2e7d32;
              color: #2e7d32;
              padding: 5px 10px;
              border-radius: 5px;
            "
          >
            로그아웃
          </button>
        </div>

        <div class="display-box">
          <img
            id="targetImg"
            src="./새 폴더/maxresdefault.jpg"
            style="width: 100%; max-width: 500px"
            alt="메인 이미지"
          />
          <p id="targetDesc">이미지를 선택하세요</p>
        </div>

        <div class="thumb-list">
          <img
            src="./새 폴더/maxresdefault copy.jpg"
            onclick="show('./새 폴더/maxresdefault copy.jpg', '원숭이')"
          />
          <img
            src="./새 폴더/hq720.jpg"
            onclick="show('./새 폴더/hq720.jpg', '아저씨')"
          />
          <img
            src="./새 폴더/861596178492177.jpg"
            onclick="show('./새 폴더/861596178492177.jpg', '노동')"
          />
          <img
            src="./새 폴더/images.jpg"
            onclick="show('./새 폴더/images.jpg', '사기')"
          />
          <img
            src="./새 폴더/Coconuts_-_single_and_cracked_open.jpg"
            onclick="
              show('./새 폴더/Coconuts_-_single_and_cracked_open.jpg', '반')
            "
          />
          <img
            src="./새 폴ダー/cc31f7cd626c17792653ce68e00f2d69.jpg"
            onclick="
              show(
                './새 폴더/cc31f7cd626c17792653ce68e00f2d69.jpg',
                '노동 주민',
              )
            "
          />
          <img
            src="./새 폴더/24910_27862_5044.jpg"
            onclick="show('./새 폴더/24910_27862_5044.jpg', '피구')"
          />
          <img
            src="./새 폴더/217-16-24-20.jpg"
            onclick="show('./새 폴더/217-16-24-20.jpg', '코코넛 포도')"
          />
          <img
            src="./새 폴더/0b3ef4a08c444ba28a4ca1d8a382bd9d.jpg"
            onclick="
              show(
                './새 폴더/0b3ef4a08c444ba28a4ca1d8a382bd9d.jpg',
                '복권 당첨',
              )
            "
          />
          <img
            src="./새 폴더/다운로드 (1).jpg"
            onclick="show('./새 폴더/다운로드 (1).jpg', '빠다 코코낫')"
            alt="과자"
          />
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 장준혁 문의: joondol1002@gmail.com</p>
    </footer>

    <script>
      // ✅ 페이지 로드 시 로그인 상태 체크
      window.onload = function () {
        const isLoggedIn = localStorage.getItem("isLoggedIn");
        const savedName = localStorage.getItem("savedName");

        if (isLoggedIn === "true") {
          document.getElementById("login-box").style.display = "none";
          document.getElementById("content-wrapper").style.display = "block";
          document.getElementById("user-display").innerText = savedName;
        } else {
          document.getElementById("login-box").style.display = "block";
          document.getElementById("content-wrapper").style.display = "none";
        }
      };

      // ✅ 로그인 함수 (subject.html과 연동됨)
      function checkLogin() {
        const nameInput = document.getElementById("userId").value;
        const pwInput = document.getElementById("userPw").value;
        const correctPw = localStorage.getItem("userPassword") || "1234";

        if (nameInput.trim() === "") {
          alert("이름을 입력해주세요.");
          return;
        }

        if (pwInput === correctPw) {
          localStorage.setItem("isLoggedIn", "true");
          localStorage.setItem("savedName", nameInput);
          alert(nameInput + "님, 환영합니다!");
          location.reload();
        } else {
          alert("비밀번호가 틀렸습니다. (초기 암호: 1234)");
        }
      }

      // ✅ 로그아웃 함수
      function logout() {
        if (confirm("로그아웃 하시겠습니까?")) {
          localStorage.removeItem("isLoggedIn");
          localStorage.removeItem("savedName");
          location.reload();
        }
      }

      // ✅ 갤러리 이미지 표시 함수
      function show(imgPath, text) {
        const mainImg = document.getElementById("targetImg");
        const mainDesc = document.getElementById("targetDesc");
        if (mainImg) mainImg.src = imgPath;
        if (mainDesc) mainDesc.innerText = text;
      }
    </script>
  </body>
</html>
