<body>

    <main>
        <div class="'display-box">
            <img id="targetlmg" src="새 폴더/maxresdefault.jpg" style="width: 100%;
            max-width: 500px;"/>
            <p id="targeDesc">원숭이</p>
        </div>
       <div class="thumb-list">
    <img src="새 폴더/maxresdefault copy.jpg"
         onclick="show('새 폴더/maxresdefault copy.jpg', '원숭이')" />

    <img src="새 폴더/hq720.jpg"
         onclick="show('새 폴더/hq720.jpg', '아저씨')" />
</div>
</main>
<script>
    //imgPath: 클릭한 사진의 주소/text: 클릭한 사지느이 설명
    function show(imgPath, text) {
        //메인 전광판 사진의 주소(src)를 클릭한 사진으로 바꾼다.
        document.getElementById("targetlmg").src = imgPath;

        //메인 전광판 설명의 글자(innerText)를 바꾼다.
        document.getElementById("targetDesc").innerText = text;
    }
</script>
