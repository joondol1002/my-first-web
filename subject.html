<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>코코넛 - 전공 탐구</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jua&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&"
    />
    <link rel="stylesheet" href="./style.css" />
    <style>
      #content-wrapper {
        display: none;
      }
      #login-box {
        display: block;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>
        <span class="material-symbols-outlined">agriculture</span>
        새는 알을 깨고 나온다
        <span class="material-symbols-outlined">sprinkler</span>
      </h1>
    </header>

    <nav>
      <a href="index.html">홈으로</a> |
      <a href="subject.html">전공 탐구하기</a> |
      <a href="gallery.html">갤러리</a>
    </nav>

    <main>
      <div
        id="login-box"
        style="
          text-align: center;
          margin: 50px auto;
          max-width: 400px;
          padding: 20px;
          border: 1px solid #ddd;
          border-radius: 15px;
          background: #fff;
        "
      >
        <h2>🔒 시스템 인증이 필요합니다</h2>
        <p style="color: #666; margin-bottom: 20px">
          내용을 보려면 성함과 암호(기본:1234)를 입력하세요.
        </p>
        <div style="margin-bottom: 10px">
          <input
            type="text"
            id="userId"
            placeholder="사용자 이름"
            style="
              width: 80%;
              padding: 10px;
              border-radius: 5px;
              border: 1px solid #ccc;
            "
          />
        </div>
        <div style="margin-bottom: 20px">
          <input
            type="password"
            id="userPw"
            placeholder="암호 입력"
            style="
              width: 80%;
              padding: 10px;
              border-radius: 5px;
              border: 1px solid #ccc;
            "
          />
        </div>
        <button
          onclick="checkLogin()"
          style="
            width: 85%;
            padding: 12px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
          "
        >
          입장하기
        </button>
      </div>

      <div id="content-wrapper">
        <div
          id="secret-area"
          style="
            text-align: center;
            margin: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
          "
        >
          <h3 style="color: #2e7d32; margin: 0">
            👋 <span id="user-display"></span>님, 반갑습니다!
          </h3>
          <div
            style="
              margin-top: 15px;
              padding: 10px;
              border-top: 1px solid #c8e6c9;
            "
          >
            <input
              type="password"
              id="newPw"
              placeholder="새 비밀번호"
              style="padding: 5px; border-radius: 4px; border: 1px solid #ccc"
            />
            <button
              onclick="changePassword()"
              style="
                cursor: pointer;
                background: #388e3c;
                color: white;
                border: none;
                padding: 6px 12px;
                border-radius: 5px;
              "
            >
              비밀번호 변경
            </button>
          </div>
          <button
            onclick="logout()"
            style="
              margin-top: 10px;
              cursor: pointer;
              background: none;
              border: 1px solid #2e7d32;
              color: #2e7d32;
              padding: 5px 10px;
              border-radius: 5px;
            "
          >
            로그아웃
          </button>
        </div>

        <section class="agriculture-portfolio">
          <article class="crop-item">
            <img src="./새 폴더/861596178492177.jpg" alt="원숭이" />
            <figcaption>그림 1.본인이 직접 재배한 농작물 실물</figcaption>
            <h3>농작물 명칭: 코코넛</h3>
            <ul>
              <li><strong>품종:</strong> 코코넛야자수</li>
              <li><strong>재배 환경:</strong> 해안가 중심</li>
            </ul>
          </article>
        </section>

        <section id="order-area">
          <hr />
          <h2>📦 온라인 주문하기</h2>
          <form id="orderForm">
            <div class="input-group">
              <label>주문자 성함</label
              ><input type="text" id="userName" placeholder="실명 입력" />
            </div>
            <div class="input-row">
              <div class="input-group">
                <label>구매 단위</label>
                <select id="unitweight">
                  <option value="15000">1kg (15,000원)</option>
                  <option value="35000">3kg (35,000원)</option>
                </select>
              </div>
              <div class="input-group">
                <label>수량</label
                ><input type="number" id="quantity" value="1" min="1" />
              </div>
            </div>
            <div class="input-group">
              <label>연락처</label
              ><input type="text" id="userPhone" placeholder="010-0000-0000" />
            </div>
            <button type="button" class="order-btn" onclick="processOrder()">
              주문 완료
            </button>
          </form>
          <div id="receipt" class="receipt-box"></div>
        </section>
      </div>
    </main>

    <footer><p>&copy; 2026 장준혁</p></footer>

    <script>
      window.onload = function () {
        if (localStorage.getItem("isLoggedIn") === "true") {
          document.getElementById("login-box").style.display = "none";
          document.getElementById("content-wrapper").style.display = "block";
          document.getElementById("user-display").innerText =
            localStorage.getItem("savedName");
        }
      };

      function checkLogin() {
        const name = document.getElementById("userId").value;
        const pw = document.getElementById("userPw").value;
        const currentPw = localStorage.getItem("userPassword") || "1234";
        if (pw === currentPw && name !== "") {
          localStorage.setItem("isLoggedIn", "true");
          localStorage.setItem("savedName", name);
          localStorage.setItem("userPassword", currentPw);
          location.reload();
        } else {
          alert("인증 실패!");
        }
      }

      function changePassword() {
        const newPw = document.getElementById("newPw").value;
        if (newPw.trim() === "") {
          alert("새 비밀번호를 입력하세요.");
          return;
        }
        localStorage.setItem("userPassword", newPw);
        alert("비밀번호가 변경되었습니다.");
        document.getElementById("newPw").value = "";
      }

      function logout() {
        localStorage.removeItem("isLoggedIn");
        location.reload();
      }

      function processOrder() {
        const name = document.getElementById("userName").value;
        if (name === "") {
          alert("이름을 입력하세요.");
          return;
        }
        document.getElementById("receipt").style.display = "block";
        document.getElementById("receipt").innerHTML =
          `<h3>주문 완료: ${name}님</h3>`;
      }
    </script>
  </body>
</html>
