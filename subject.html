<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <section class="agriculture-portfolio">
            <article class="info-block distribution">
                <h4>유통 구조 설계</h4>
                <div class="step-guide">
                    <span>생산자(나)</span> <span>로컬푸드 직매장</span>
                    <span>최종 소비자</span>
                </div>
                <ul>
                    <li>
                        <strong>물류 방식:</strong> 저온 유통(cold chain) 활용 여부 등
                    </li>
                    <li><strong>판매 정략:</strong>직거래/온라인 마켓 등</li>
                </ul>
            </article>
        </section>
        <section id="order-area">
            <hr>
            <h2> 온라인 주문하기</h2>
            <form action="">
                <div class="input-group">
                    <label for="">주문자 성함</label>
                    <input type="text" placeholder="실명을 입력하세요">
                </div>

                <div class="input-group">
                    <label>주문 방식 선택</label>
                    <select>
                        <option>일반 택배 (3,000원</option>
                        <option>신선 택배 배송 (5,000원)</option>
                        <option>광주 로컬푸드 매장 픽업 (무료)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>배송 메시지</label>
                    <textarea placeholder="부재 시 문 앞에 놓아주세요"></textarea>
                </div>  

                <button type="submit">지금 바로 주문 완료</button>
                </form>
        </section>
    </main>

    <footer>
        문의 : joondol1002@gmail.com, &copy; all right resevered by 2026 장준혁 
    </footer>
</body>
</html>
