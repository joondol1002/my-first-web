<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <section class="agriculture-portfolio">
            <article class="info-block distribution">
                <h4>유통 구조 설계</h4>
                <div class="step-guide">
                    <span>생산자(나)</span> <span>로컬푸드 직매장</span>
                    <span>최종 소비자</span>
                </div>
                <ul>
                    <li>
                        <strong>물류 방식:</strong> 저온 유통(cold chain) 활용 여부 등
                    </li>
                    <li><strong>판매 정략:</strong>직거래/온라인 마켓 등</li>
                </ul>
            </article>
        </section>
        <section id="order-area">
            <hr>
            <h2> 온라인 주문하기</h2>
            <form>
                <div class="input-row">
                    <div class="input-group">
                    <label>주문자 성함</label>
                    <input type="text" id="userName" placeholder="실명을 입력하세요">
                </div>
                <div class="input-group">
                    <label>연락처</label>
                    <input type="text" id="userName" placeholder="010-0000-0000">
                </div>
                </div>

                <div class="input-group">
                    <label>배송 방식 선택</label>
                    <select>
                        <option>일반 택배 (3,000원)</option>
                        <option>신선 택배 배송 (5,000원)</option>
                        <option>광주 로컬푸드 매장 픽업 (무료)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>배송 메시지</label>
                    <textarea placeholder="부재 시 문 앞에 놓아주세요"></textarea>
                </div>  

                <button type="button" class="order-btn" onclick="processOrder()">지금 바로 주문 완료</button>

                <div id="receipt" class="receipt-box"></div>
                </form>
        </section>
    </main>

    <footer>
        문의 : joondol1002@gmail.com, &copy; all right resevered by 2026 장준혁 
    </footer>



    <script>
        function processOrder() {
            // 1. 입력창(id)에서 값을 가져와 변수에 저장
            let name = document.getElementById("userName").value;
            let phone = document.getElementById("userPhone").value;
            let messago = document.querySelector("textarea").value;

            // 2. 입력창에 내용이 비어있는지 검사 (|| 검사)
            if (name === "" || phone === "") {
                alert(" 성함과 연락처를 모두 입력해주세요!");
                return;
            }

             // 3. 영수증 상자 찾아오기
                let receipt = document.getElementById("receipt");

            // .4 내영 채워넣기
            receipt.innerHTML = `
              <h3> 주문 확인 영수증</h3> 
               <p><strong> 주문자:</strong> ${name} 님</p>
              <p><strong>연락처:</strong> ${phone}</p>
              <p><strong>요청사항:</strong> ${messae || "없음"}</p>
              <hr>
              <p style="texp-align:center;">주문해주셔서 감사합니다! </P>
            `;

            //5. 숨겨져 있던 영수증 상자 보여주기
            receipt.style.display = "block";
            
        }
    </script>
</body>
</html>
